<!DOCTYPE html>
<html>
<head>
    <title>Register Patient</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: auto; padding: 50px; background-color: #f4f7f6; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background-color: #27ae60; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn-submit:hover { background-color: #219150; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>New Registration</h2>
        <form method="POST">
            <label>Patient Full Name:</label>
            <input type="text" name="name" placeholder="e.g. John Doe" required>
            
            <label>Reason for Visit:</label>
            <input type="text" name="ailment" placeholder="e.g. Fever, Checkup" required>
            
            <button type="submit" class="btn-submit">Add to Waiting List</button>
        </form>
        <a href="/" class="back-link">← Cancel and Go Back</a>
    </div>
</body>
</html>
